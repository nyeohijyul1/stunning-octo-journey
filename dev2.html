<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        #wrapper {
            display: flex;
            height: 100dvh;
            justify-content: center;
            align-items: center;
        }
        #container {
            display: grid;
            grid-template-rows: 50px auto 50px;
            grid-template-columns: 50px auto 50px;
            /* gap: 30px; */
        }
        table {
            grid-row: 2;
            grid-column: 2;
            border-spacing: 30px;
        }
        td {
            width: 100px;
            height: 100px;
        }
        button {
            border: 0;
            background-color: transparent;
            width: 50px;
            height: 50px;
            text-align: center;
            line-height: 50px;
            box-shadow: 0 0 10px #bebebe;
            border-radius: 10px;
            &:hover {
                box-shadow: inset 0 0 10px #bebebe;
            }
        }
        td {
            --box-shadow: 0 0 20px;
            border-radius: 10px;
            transition: transform 0.5s cubic-bezier(0,3,1,1);
            &:hover {
                transform: scale(0.9);
            }
        }
        #top {
            grid-row: 1;
            grid-column: 2;
        }
        #right {
            grid-row: 2;
            grid-column: 3;
        }
        #bottom {
            grid-row: 3;
            grid-column: 2;
        }
        #left {
            grid-row: 2;
            grid-column: 1;
        }
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div id="wrapper">
    <div id="container">
        <table>
            <tr>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
            </tr>
        </table>
        <div id="top" class="button-container"><button id="topBtn">+</button></div>
        <div id="right" class="button-container"><button id="rightBtn">+</button></div>
        <div id="bottom" class="button-container"><button id="bottomBtn">+</button></div>
        <div id="left" class="button-container"><button id="leftBtn">+</button></div>

        <!-- <button id="top">+</button>
        <button id="right">+</button>
        <button id="bottom">+</button>
        <button id="left">+</button> -->
    </div>
    </div>
    <script type="module">
        import Draggable from './draggable.js';
        class randomColor {
            constructor(element) {
                this.element = element;
                // this.hue = 250 + Math.random()*140;
                this.hue = Math.random()*360;
                // this.element.style.backgroundColor = `oklch(0.7246 0.1377 ${this.hue} / 50%)`
                this.element.style.backgroundColor = `oklch(0.8 0.1 ${this.hue} / 60%)`
                this.style = getComputedStyle(this.element);
                // this.element.style.boxShadow = `${this.style.getPropertyValue("--box-shadow").trim()} oklch(0.5 0.1377 ${this.hue} / 50%)`
                this.element.style.boxShadow = `${this.style.getPropertyValue("--box-shadow").trim()} oklch(0.6 0.1 ${this.hue} / 60%)`
            }
        }
        const table = document.querySelector("table");
        [...document.querySelectorAll('td')].forEach(element => {
            new Draggable(element);
            new randomColor(element);
        })
    </script>
</body>
</html>
