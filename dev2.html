<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        table {
            /* border-collapse: collapse; */
            border-spacing: 30px;
        }
        td {
            width: 100px;
            height: 100px;
            box-shadow: 0 0 10px #999;
            border-radius: 10px;
            transition: transform 0.5s cubic-bezier(0,3,1,1);
            &:hover {
                box-shadow: inset 0 0 10px #999;
                transform: scale(0.9);
            }
        }
        .button {
            display: flex;
            justify-content: center;
            & > td {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <table>
            <tr class="button">
                <td colspan="2"><button></button></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td></td>
                <td></td>
            </tr>
            <tr class="button">
                <td colspan="2"><button></button></td>
            </tr>
        </table>
        <button></button>
        <button></button>
    </div>
    <script>
        const table = document.querySelector("table");
    </script>
</body>
</html>
