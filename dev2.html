<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }
        #wrapper {
            display: grid;
            place-items: center;
            min-height: 100dvh;
            min-width: fit-content;
            padding: 30px;
        }
        #container {
            display: grid;
            grid-template-rows: 50px auto 50px;
            grid-template-columns: 50px max-content 50px;
            /* gap: 30px; */
        }
        table {
            grid-row: 2;
            grid-column: 2;
            border-spacing: 30px;
        }
        td {
            width: 100px;
            height: 100px;
        }
        button {
            border: 0;
            background-color: transparent;
            width: 100%;
            height: 100%;
            text-align: center;
            line-height: 50px;
            box-shadow: 0 0 20px #cecece;
            border-radius: 10px;
            transition: box-shadow 0.5s;
            &:hover {
                box-shadow: 0 0 20px #9e9e9e;
            }
        }
        td {
            --box-shadow: 0 0 20px;
            border-radius: 10px;
            transition: transform 0.5s cubic-bezier(0,3,1,1);
            &:hover {
                transform: scale(1.1);
            }
        }
        #top {
            padding: 0 30px;
            grid-row: 1;
            grid-column: 2;
        }
        #right {
            padding: 30px 0;
            grid-row: 2;
            grid-column: 3;
        }
        #bottom {
            padding: 0 30px;
            grid-row: 3;
            grid-column: 2;
        }
        #left {
            padding: 30px 0;
            grid-row: 2;
            grid-column: 1;
        }
        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dragHandle {
            margin: 10%;
            width: 80%;
            height: 80%;
            &:hover {
                cursor: grab;
            }
        }
    </style>
</head>
<body>
    <div id="wrapper">
    <div id="container">
        <table>
            <tbody>
                <tr>
                    <td><div class="dragHandle"></div></td>
                    <td><div class="dragHandle"></div></td>
                </tr>
                <tr>
                    <td><div class="dragHandle"></div></td>
                    <td><div class="dragHandle"></div></td>
                </tr>
            </tbody>
        </table>
        <div id="top" class="button-container"><button id="topBtn">+</button></div>
        <div id="right" class="button-container"><button id="rightBtn">+</button></div>
        <div id="bottom" class="button-container"><button id="bottomBtn">+</button></div>
        <div id="left" class="button-container"><button id="leftBtn">+</button></div>
    </div>
    </div>
    <script type="module">
        import Draggable from './draggable.js';
        class randomColor {
            constructor(element) {
                this.element = element;
                this.hue = Math.random()*360;
                this.element.style.backgroundColor = `oklch(0.8 0.1 ${this.hue} / 60%)`
                this.style = getComputedStyle(this.element);
                this.element.style.boxShadow = `${this.style.getPropertyValue("--box-shadow").trim()} oklch(0.6 0.1 ${this.hue} / 60%)`
            }
        }
        const tbody = document.querySelector("tbody");
        const tr = document.querySelectorAll("tr");
        let currentRow = 2;
        let currentCol = 2;
        const addRow = (isPrepend = true) => {
            const newRow = document.createElement("tr");
            const tds = [];
            for (let index = 0; index < currentCol; index++) {
                const newTd = document.createElement("td");
                const newDiv = document.createElement("div");
                newDiv.className = "dragHandle";
                newTd.appendChild(newDiv);
                newRow.appendChild(newTd);
                tds.push(newTd);
            }
            if (isPrepend) {
                tbody.prepend(newRow);
                tdList.forEach(item => {
                    item.row += 1
                })
            } else {
                tbody.appendChild(newRow);
            }
            tds.forEach((element, i) => processTd({
                element,
                rc: {
                    row: isPrepend ? 0 : currentRow,
                    rowspan: 1,
                    col: i,
                    colspan: 1
                },
                // func: isPrepend ? () => {
                //     tdList.forEach(item => {
                //         item.row += 1
                //     })
                // } : undefined
            }))
            currentRow++;
        }
        const addCol = (isPrepend = true) => {
            const trs = [...document.querySelectorAll("tr")];
            const tds = [];
            const makeNewTd = () => {
                const newTd = document.createElement("td");
                const newDiv = document.createElement("div");
                newDiv.className = "dragHandle";
                newTd.appendChild(newDiv);
                return newTd;
            }
            if (isPrepend) {
                for (let index = 0; index < currentRow; index++) {
                    let newTd = makeNewTd();
                    tds.push(newTd);
                    trs[index].prepend(newTd);
                }
                tdList.forEach(item => {
                    item.col += 1
                })
            } else {
                for (let index = 0; index < currentRow; index++) {
                    let newTd = makeNewTd();
                    tds.push(newTd);
                    trs[index].appendChild(newTd);
                }
            }
            tds.forEach((element, i) => processTd({
                element,
                rc: {
                    row: i,
                    rowspan: 1,
                    col: isPrepend ? 0 : currentCol,
                    colspan: 1
                },
                // func: isPrepend ? () => {
                //     tdList.forEach(item => {
                //         item.col += 1
                //     })
                // } : undefined
            }))
            currentCol++;
        }
        document.querySelector("#topBtn").addEventListener("click", addRow);
        document.querySelector("#bottomBtn").addEventListener("click", () => addRow(false));
        document.querySelector("#rightBtn").addEventListener("click", () => addCol(false));
        document.querySelector("#leftBtn").addEventListener("click", addCol);
        let tdList = [];
        const processTd = ({
            element,
            rc,
            // func = () => {},
            // callback = () => {console.log(tdList)}
        }) => {
            // func();

            // if (isPrepend) {
            //     tdList.shift({
            //         td: element,
            //         drag: new Draggable(element),
            //         color: new randomColor(element),
            //         ...rc
            //     })
            //     return;
            // }
            tdList[tdList.length] = {
                td: element,
                drag: new Draggable(element),
                color: new randomColor(element),
                ...rc
            }
            // dragList[dragList.length] = {item: new Draggable(element)};
            // colorList[colorList.length] = new randomColor(element);
            
            // callback();
        }
        [...document.querySelectorAll('td')].forEach((element, i) => processTd({
            element,
            rc: {
                row: Math.floor(i/2),
                rowspan: 1,
                col: i%2,
                colspan: 1
            }
        }));
        tbody.addEventListener("click", (e) => {
            tdList.forEach((a, i) => {
                if (a.td == e.target) {
                    // console.log(i)
                    console.log(a.row, a.col)
                }
            });
        })
    </script>
</body>
</html>
