<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        #container {
            display: flex;
            justify-content: center;
        }
        #box {
            width: 100px;
            height: 100px;
            background-color: cornflowerblue;
            /* transition: 0.1s linear; */
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="wrapper">
            <div id="box"></div>
        </div>
    </div>
    <script>
        const box = document.querySelector("#box");

        class Draggable {
            constructor(element) {
                this.element = element;
                // translate 값
                this.x = 0;
                this.y = 0;
                // 요소 크기 가져오기
                this.width = this.element.offsetWidth;
                this.height = this.element.offsetHeight;
                // 최초 위치 가져오기
                this.initX = this.element.offsetLeft;
                this.initY = this.element.offsetTop;
                // 오프셋 설정
                this.offsetX = 0;
                this.offsetY = 0;
                
                this.onmousedown = (e) => {
                    this.dragStart(e);
                    this.element.addEventListener("mousemove", this.onmousemove);
                    this.element.addEventListener("mouseup", this.onmouseup);
                }
                this.onmousemove = (e) => {
                    this.calcTranslate(e);
                    this.render(e);
                }
                this.onmouseup = () => {
                    this.element.removeEventListener("mousemove", this.onmousemove);
                    this.element.removeEventListener("mouseup", this.onmouseup);
                }

                this.element.addEventListener("mousedown", this.onmousedown);
            }
            dragStart(e) {
                // mouseOffset : 초기위치에서 처음 event 의 좌표를 빼기
                let mouseOffsetX = this.initX - e.x;
                let mouseOffsetY = this.initY - e.y;
                // offset : 초과 이동된 값 미리 계산 = 초기위치만큼 빼고, mouseOffset 만큼 덜 이동하도록
                // 계산: init + mouseOffset
                this.offsetX = this.initX + mouseOffsetX;
                this.offsetY = this.initY + mouseOffsetY;
            }
            calcTranslate(e) {
                // event 위치에서 오프셋만큼 빼서 움직일 거리 계산
                this.x = e.x - this.mouseOffsetX;
                this.y = e.y - this.mouseOffsetY;
            }
            render() {
                this.element.style.transform = `translate(${this.x}px, ${this.y}px)`
            }
        }
        new Draggable(box);

    </script>
</body>
</html>
