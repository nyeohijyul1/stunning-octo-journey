<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        #container {
            display: flex;
            justify-content: center;
        }
        #box {
            width: 100px;
            height: 100px;
            background-color: cornflowerblue;
            /* transition: 0.1s linear; */
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="wrapper">
            <div id="box"></div>
        </div>
    </div>
    <script>
        const box = document.querySelector("#box");
        const Move = (e) => {
            box.style.transform = `translate(${e.x-box.offsetLeft-box.offsetWidth/2}px, ${e.y-box.offsetTop-box.offsetHeight/2}px)`
            
            if (Math.abs(e.x-box.left) > box.offsetWidth || Math.abs(e.y-box.top) > box.offsetHeight) { // 작동 이상함
                Up();
            }
            
            // ChatGPT 코드 - position absolute 해야돼서 나중에 레이아웃 꼬일듯
            
            // box.style.left = `${e.x-box.offsetWidth/2}px`;
            // box.style.top = `${e.y-box.offsetHeight/2}px`;

            // const rect = box.getBoundingClientRect();

            // if (
            //     e.clientX < rect.left ||
            //     e.clientX > rect.right ||
            //     e.clientY < rect.top ||
            //     e.clientY > rect.bottom
            // ) {
            //     Up();
            // }
        }
        const Up = () => {
            box.style.transform = ""
            box.removeEventListener("mousemove", Move)
            box.removeEventListener("mouseup", Up)
        }
        box.addEventListener("mousedown", () => {
            box.addEventListener("mousemove", Move)
            box.addEventListener("mouseup", Up)
        })

    </script>
</body>
</html>
